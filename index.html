<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Defensoría Oficial 6</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #d4eaf7; /* celeste suave */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* === CUADRADOS EN EL BORDE IZQUIERDO (se mantienen) === */
        .left-squares {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: flex-start;
            padding: 15px 0;
            pointer-events: none;
            z-index: 5;
        }

        .square {
            border-style: solid;
            border-width: 4px;
            background: transparent;
            backdrop-filter: blur(3px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .s1 { width: 80px; height: 80px; border-color: rgba(30, 144, 255, 0.9); margin-left: 10px; }
        .s2 { width: 130px; height: 130px; border-color: rgba(255, 80, 120, 0.9); margin-left: 40px; }
        .s3 { width: 60px; height: 60px; border-color: rgba(50, 220, 130, 0.9); margin-left: 0px; }
        .s4 { width: 110px; height: 110px; border-color: rgba(255, 180, 50, 0.9); margin-left: 30px; }
        .s5 { width: 70px; height: 70px; border-color: rgba(200, 80, 255, 0.9); margin-left: 15px; }
        .s6 { width: 140px; height: 140px; border-color: rgba(0, 210, 210, 0.9); margin-left: 50px; }
        .s7 { width: 90px; height: 90px; border-color: rgba(255, 130, 200, 0.9); margin-left: 5px; }
        .s8 { width: 120px; height: 120px; border-color: rgba(100, 200, 255, 0.9); margin-left: 25px; }
        .s9 { width: 65px; height: 65px; border-color: rgba(255, 100, 100, 0.9); margin-left: 20px; }
        .s10 { width: 100px; height: 100px; border-color: rgba(180, 220, 80, 0.9); margin-left: 35px; }

        /* === DESTELLOS LUMINOSOS === */
        .glow-blue {
            animation: glowPulseBlue 2.5s ease-in-out infinite;
        }
        .glow-pink {
            animation: glowPulsePink 3s ease-in-out infinite;
        }
        .glow-gold {
            animation: glowPulseGold 2s ease-in-out infinite;
        }
        .glow-purple {
            animation: glowPulsePurple 3.5s ease-in-out infinite;
        }

        @keyframes glowPulseBlue {
            0%, 100% { box-shadow: 0 0 15px rgba(30, 144, 255, 0.3), 0 0 30px rgba(30, 144, 255, 0.1); }
            50% { box-shadow: 0 0 30px rgba(30, 144, 255, 0.8), 0 0 60px rgba(30, 144, 255, 0.4), 0 0 100px rgba(30, 144, 255, 0.2); }
        }
        @keyframes glowPulsePink {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 80, 120, 0.3), 0 0 30px rgba(255, 80, 120, 0.1); }
            50% { box-shadow: 0 0 30px rgba(255, 80, 120, 0.8), 0 0 60px rgba(255, 80, 120, 0.4), 0 0 100px rgba(255, 80, 120, 0.2); }
        }
        @keyframes glowPulseGold {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 180, 50, 0.3), 0 0 30px rgba(255, 180, 50, 0.1); }
            50% { box-shadow: 0 0 30px rgba(255, 180, 50, 0.8), 0 0 60px rgba(255, 180, 50, 0.4), 0 0 100px rgba(255, 180, 50, 0.2); }
        }
        @keyframes glowPulsePurple {
            0%, 100% { box-shadow: 0 0 15px rgba(200, 80, 255, 0.3), 0 0 30px rgba(200, 80, 255, 0.1); }
            50% { box-shadow: 0 0 30px rgba(200, 80, 255, 0.8), 0 0 60px rgba(200, 80, 255, 0.4), 0 0 100px rgba(200, 80, 255, 0.2); }
        }

        /* === CONTENEDOR CENTRAL (más destacado y clickeable) === */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 1000px;
            padding: 35px 55px;
            background: rgba(255, 255, 255, 0.30);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 3px solid rgba(30, 144, 255, 0.6);
            box-shadow: 0 0 40px rgba(30, 144, 255, 0.25), inset 0 0 30px rgba(30, 144, 255, 0.1);
            text-align: center;
            z-index: 10;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .main-content:hover {
            transform: scale(1.02);
            box-shadow: 0 0 60px rgba(30, 144, 255, 0.4), inset 0 0 40px rgba(30, 144, 255, 0.15);
        }

        .main-content:active {
            transform: scale(0.98);
        }

        .main-content h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 2.8rem; /* reducido */
            color: #1a5276; /* celeste oscuro */
            letter-spacing: 2px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.05);
            white-space: nowrap;
        }

        .main-content h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.4rem; /* reducido */
            color: #1a5276; /* celeste oscuro */
            letter-spacing: 1px;
            opacity: 0.9;
            white-space: nowrap;
            margin-top: 0;
        }

        /* === MODAL INFERIOR DERECHO === */
        .modal-footer {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0a2f5a;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            z-index: 100;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 1;
            transition: opacity 1s ease;
            white-space: nowrap;
        }

        .modal-footer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* === RESPONSIVE === */
        @media (max-width: 1000px) {
            .main-content h1 { font-size: 2.4rem; }
            .main-content h2 { font-size: 1.2rem; }
            .main-content { padding: 30px 35px; gap: 12px; }
        }

        @media (max-width: 780px) {
            .main-content {
                flex-direction: column;
                gap: 4px;
                padding: 25px 20px;
            }
            .main-content h1 {
                font-size: 2.0rem;
                white-space: normal;
            }
            .main-content h2 {
                font-size: 1.0rem;
                white-space: normal;
            }
            .left-squares { width: 150px; }
            .square { border-width: 3px; }
            .s1 { width: 60px; height: 60px; margin-left: 5px; }
            .s2 { width: 100px; height: 100px; margin-left: 25px; }
            .s3 { width: 45px; height: 45px; margin-left: 0; }
            .s4 { width: 85px; height: 85px; margin-left: 20px; }
            .s5 { width: 55px; height: 55px; margin-left: 10px; }
            .s6 { width: 110px; height: 110px; margin-left: 35px; }
            .s7 { width: 70px; height: 70px; margin-left: 5px; }
            .s8 { width: 95px; height: 95px; margin-left: 15px; }
            .s9 { width: 50px; height: 50px; margin-left: 10px; }
            .s10 { width: 80px; height: 80px; margin-left: 25px; }
            .modal-footer {
                font-size: 0.65rem;
                padding: 4px 12px;
                bottom: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .main-content h1 { font-size: 1.6rem; }
            .main-content h2 { font-size: 0.9rem; }
            .left-squares { width: 120px; }
            .modal-footer {
                font-size: 0.6rem;
                padding: 3px 10px;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Cuadrados en el borde izquierdo (originales) -->
    <div class="left-squares">
        <div class="square s1 glow-blue"></div>
        <div class="square s2 glow-pink"></div>
        <div class="square s3"></div>
        <div class="square s4 glow-gold"></div>
        <div class="square s5 glow-purple"></div>
        <div class="square s6"></div>
        <div class="square s7 glow-pink"></div>
        <div class="square s8 glow-blue"></div>
        <div class="square s9"></div>
        <div class="square s10 glow-gold"></div>
    </div>

    <!-- Contenedor central (destacado y clickeable) -->
    <div class="main-content" id="mainContent">
        <h1>Defensoría Oficial 6</h1>
        <h2>Ministerio Público de Misiones</h2>
    </div>

    <!-- Modal inferior derecho -->
    <div id="modalCredit" class="modal-footer">Diseño Rómulo Fioravante</div>

    <script>
        window.addEventListener('load', function() {
            // Oculta el modal después de 3 segundos
            setTimeout(function() {
                const modal = document.getElementById('modalCredit');
                if (modal) modal.classList.add('hidden');
            }, 3000);

            // Redirige al hacer clic en el contenedor central
            const mainContent = document.getElementById('mainContent');
            if (mainContent) {
                mainContent.addEventListener('click', function() {
                    window.location.href = 'https://defensoria6.github.io/web/1';
                });
            }
        });
    </script>
</body>
</html>
